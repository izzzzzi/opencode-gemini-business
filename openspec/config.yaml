schema: spec-driven

context: |
  Project: opencode-gemini-business
  Description: OpenCode plugin for multi-account Gemini Business API rotation with automatic failover and load balancing.
  Version: 2.1.0
  License: MIT

  Tech stack:
    - TypeScript 5.3+, ES2022 modules (ESM)
    - Node.js >=18.0.0
    - node-fetch 3.x for HTTP
    - Built-in crypto for HMAC-SHA256 JWT signing
    - Vitest for testing
    - Semantic Release for versioning

  Architecture:
    - Plugin entry point: index.ts — exports GeminiBusinessPlugin factory
    - API client: src/gemini-business-api.ts — JWT auth, session management, SSE streaming
    - Account pool: src/account-manager.ts — rotation strategies, health tracking, failover
    - Types: src/types.ts — TypeScript interfaces
    - CLI: cli.ts + bin/cli.js — account management commands

  Key features:
    - Multi-account pool with round-robin, least-used, and random rotation
    - JWT (HS256) authentication via XSRF tokens
    - Session caching (50 min) with auto-refresh
    - SSE streaming with OpenAI-compatible response format
    - Automatic failover: error counting, auto-disable after threshold
    - CLI for add/list/remove/test accounts

  Supported models:
    - gemini-2.5-flash, gemini-2.5-pro
    - gemini-3-flash-preview, gemini-3.1-pro-preview
    - auto (Gemini auto-selects best model)

  API endpoints:
    - business.gemini.google/auth/getoxsrf — XSRF token
    - biz-discoveryengine.googleapis.com — session creation & streaming

  Conventions:
    - Conventional commits (feat/fix/chore/docs)
    - OpenAI-compatible request/response format
    - Credentials stored in ~/.config/opencode/

rules:
  proposal:
    - Keep proposals concise and focused on one feature/change
    - Always include impact on existing accounts and backward compatibility
    - Consider security implications for authentication changes
  design:
    - Include sequence diagrams for API flow changes
    - Document error handling and failover behavior
    - Specify OpenAI compatibility requirements
  tasks:
    - Break tasks into chunks of max 2 hours
    - Include test requirements for each task
    - Tag tasks affecting API, CLI, or account management
